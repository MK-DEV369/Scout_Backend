          format: double
        gw_per_unit_per_km:
          type: number
          format: double
        gt_per_unit_per_km:
          type: number
          format: double
    LoadUnit:
      type: object
      properties:
        quantity:
          type: integer
          format: int32
        unitType:
          type: string
          enum:
            - boxes
            - crate
            - envelope
            - pallets
            - container20
            - container40
            - container40HC
            - container45HC
            - container53
            - LD1
            - LD2
            - LD3
            - LD5
            - LD6
            - LD7
            - LD8
            - LD9
            - LD11
        unitWeightKg:
          type: number
          format: double
        unitVolumeCBM:
          type: number
          format: double
      description: A list of the load units (pallets or containers etc.) being shipped
      example: '737'
    Location:
      type: object
      description: End point of shipment. Note specific schemes for airport, searport or longitude/latitude
    Seaport:
      type: object
      allOf:
        - $ref: '#/components/schemas/Location'
        - type: object
          properties:
            unLocationCode:
              type: string
              example: "USNYC"
    Shipment:
      type: object
      properties:
        legs:
          type: array
          items:
            $ref: '#/components/schemas/Leg'
        load:
          type: array
          description: A list of the load units (pallets or containers etc.) being shipped
          example: '737'
          items:
            $ref: '#/components/schemas/LoadUnit'
    CO2CalcDataLeg:
      type: object
      properties:
        title:
          type: string
        Ew:
          type: number
          format: double
        Gw:
          type: number
          format: double
        Et:
          type: number
          format: double
        Gt:
          type: number
          format: double
    ShipmentFootprintReport:
      type: object
      properties:
        title:
          type: string
        Ew:
          type: number
          format: double
        Gw:
          type: number
          format: double
        Et:
          type: number
          format: double
        Gt:
          type: number
          format: double
        legsData:
          type: array
          items:
            $ref: '#/components/schemas/CO2CalcDataLeg'
        shortDeclaration:
          type: string
        report:
          type: string
    UnauthorizedFaultMessage:
      type: object
      properties:
        messages:
          type: array
          items:
            type: object
            properties:
              code:
                type: object
                properties:
                  value:
                    type: string
                    example: '401'
              reason: 
                type: object
                properties:
                  value:
                    type: string
                    example: Unauthorized
    BadRequestFaultMessage:
      type: object
      properties:
        messages:
          type: array
          items:
            type: object
            properties:
              code:
                type: object
                properties:
                  value:
                    type: string
                    example: '400'
              reason: 
                type: object
                properties:
                  value:
                    type: string
                    example: Bad Request
    InternalFaultMessage:
      type: object
      properties:
        messages:
          type: array
          items:
            type: object
            properties:
              code:
                type: object
                properties:
                  value:
                    type: string
                    example: '500'
              reason: 
                type: object
                properties:
                  value:
                    type: string
                    example: Internal Communication Error

          
