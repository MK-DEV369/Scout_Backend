        voyageNumber:
          type: string
          description: Flight number of sea voyage number. May be used in future to make the calculation more specific.
          example: '"AA123"'
        vesselModel:
          type: string
          description: Model number of vessel. May be used in future to make the calculation more specific.
          example: '"737"'
        freighter:
          type: boolean
          description: For air only, true for a dedicated freighter aircraft, false for passenger. May be used in future to make the calculation more specific.
          example: false
        compoundLeg:
          type: boolean
          description: 'True if this leg is likely to be a compound leg e.g. door-to-door movement which spilts into truck-ship-truck. False if it is definitely one single carrier leg. Default/null: Infer automatically.'
        Ew:
          type: number
          description: Total kilograms of CO2 equivalent GHG emissions (well-to-wheels) for this leg if known. If ommitted an estimate will be calculated.
          format: double
        Gw:
          type: number
          description: Total energy consumption (well-to-wheels) for this leg if known. If ommitted an estimate will be calculated.
          format: double
        Et:
          type: number
          description: Total kilograms of CO2 equivalent GHG emissions (tank-to-wheels) for this leg if known. If ommitted an estimate will be calculated.
          format: double
        Gt:
          type: number
          description: Total energy consumption (tank-to-wheels) for this leg if known. If ommitted an estimate will be calculated.
          format: double
        Ew_per_unit_per_km:
          type: number
          description: Total kilograms of CO2 equivalent GHG emissions (well-to-wheels) for this leg if known. If ommitted an estimate will be calculated.
          format: double
        Gw_per_unit_per_km:
          type: number
          description: Total energy consumption (well-to-wheels) for this leg if known. If ommitted an estimate will be calculated.
          format: double
        Et_per_unit_per_km:
          type: number
          description: Total kilograms of CO2 equivalent GHG emissions (tank-to-wheels) for this leg if known. If ommitted an estimate will be calculated.
          format: double
        Gt_per_unit_per_km:
          type: number
          description: Total energy consumption (tank-to-wheels) for this leg if known. If ommitted an estimate will be calculated.
          format: double
        gw:
